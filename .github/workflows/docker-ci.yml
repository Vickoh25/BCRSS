name: BCRSS Docker CI/CD

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backend .env
        run: |
          cat > backend/.env <<EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False

          USE_MYSQL=False

          DB_NAME=bcrss
          DB_USER=root
          DB_PASSWORD=
          DB_HOST=localhost
          DB_PORT=3306

          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}

          EMAIL_HOST=${{ secrets.EMAIL_HOST }}
          EMAIL_PORT=587
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL=noreply@bcrss.com
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        run: docker build -t bcrss-backend ./backend

      - name: Build Frontend
        run: docker build -t bcrss-frontend ./frontend

      - name: Start Containers
        run: docker compose up -d

      - name: Wait for Backend
        run: sleep 20

      - name: Show Container Status
        if: always()
        run: docker ps -a

      - name: Backend Logs
        if: always()
        run: docker compose logs backend

      - name: Django Check
        run: docker compose exec -T backend python manage.py check

      - name: Run Migrations
        run: docker compose exec -T backend python manage.py migrate

      - name: Run Tests
        run: docker compose exec -T backend python manage.py test

      - name: Shutdown
        if: always()
        run: docker compose down