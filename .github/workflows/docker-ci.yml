name: BCRSS Docker CI/CD

on:
  push:
    branches: [main, dev]

  pull_request:
    branches: [main, dev]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > backend/.env <<EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          USE_MYSQL=False
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          EMAIL_HOST=${{ secrets.EMAIL_HOST }}
          EMAIL_PORT=587
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL=noreply@bcrss.com
          EOF

      - name: Build Images
        run: docker compose build

      - name: Start Containers
        run: docker compose up -d

      - name: Wait for Backend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/admin/login/ > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Django Check
        run: docker compose exec -T backend python manage.py check

      - name: Run Migrations
        run: docker compose exec -T backend python manage.py migrate

      - name: Run Tests
        run: docker compose exec -T backend python manage.py test

      - name: Shutdown
        if: always()
        run: docker compose down