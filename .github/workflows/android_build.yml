name: Build Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'bcrss_mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd bcrss_mobile
          flutter pub get

      - name: Build APK
        run: |
          cd bcrss_mobile
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bcrss-app-release
          path: bcrss_mobile/build/app/outputs/flutter-apk/app-release.apk
