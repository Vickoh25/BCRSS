services:
  backend:
    build: ./backend
    container_name: bcrss-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build: ./frontend
    container_name: bcrss-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "80:80"