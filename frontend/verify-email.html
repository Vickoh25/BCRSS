<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - BCRSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <div id="loading-state">
            <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-emerald-600 mx-auto mb-4"></div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Verifying your email...</h1>
            <p class="text-gray-600">Please wait while we confirm your account.</p>
        </div>

        <div id="success-state" class="hidden">
            <div class="bg-emerald-100 text-emerald-600 rounded-full h-20 w-20 flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-check text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Email Verified!</h1>
            <p class="text-gray-600 mb-8">Your account has been successfully verified. You can now log in to access all features.</p>
            <a href="index.html" class="block w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Go to Login
            </a>
        </div>

        <div id="error-state" class="hidden">
            <div class="bg-red-100 text-red-600 rounded-full h-20 w-20 flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-xmark text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Verification Failed</h1>
            <p id="error-message" class="text-gray-600 mb-8">The verification link is invalid or has expired.</p>
            <a href="index.html" class="block w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Back to Home
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const apiClient = new APIClient();
        
        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const uid = urlParams.get('uid');

            if (!token || !uid) {
                showState('error', 'Missing verification parameters.');
                return;
            }

            try {
                await apiClient.verifyEmail(token, uid);
                showState('success');
            } catch (err) {
                showState('error', err.message || 'Verification failed. Please try again later.');
            }
        }

        function showState(state, message = '') {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('success-state').classList.add('hidden');
            document.getElementById('error-state').classList.add('hidden');
            
            document.getElementById(`${state}-state`).classList.remove('hidden');
            if (message) {
                document.getElementById('error-message').innerText = message;
            }
        }

        // Start verification process
        window.onload = verify;
    </script>
</body>
</html>
